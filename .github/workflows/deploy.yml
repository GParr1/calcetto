name: Deploy

actions:
  build:
    runs-on: ubuntu-latest
steps:
  - name: Checkout code
    uses: actions/checkout@v2

  - name: Install dependencies
    run: npm install

  - name: Lint code
    run: npm run lint

  - name: Run tests
    run: npm test

  - name: Build project
    run: npm run build

  - name: Deploy to server
    run: npm run deploy

  - name: Export for web
    run: npm run build:expo-web