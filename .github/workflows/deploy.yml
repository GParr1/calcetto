name: Deploy Expo App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Expo Web
        run: npm run build:expo-web

      - name: Rename dist folder (if needed)
        run: |
          if [ -d "dist" ]; then
            echo "dist folder found"
          elif [ -d "web-build" ]; then
            mv web-build dist
            echo "Renamed web-build to dist"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist